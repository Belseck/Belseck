name: Update README cards

on:
  schedule:
    - cron: "0 19 * * *"

  workflow_dispatch:

  push:
    branches:
    - master

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show=reviews,prs_merged,prs_merged_percentage&show_icons=true&include_all_commits=true&count_private=true&hide_border=false&border_color=e5e3e3
          path: profile/stats.svg
          # token: ${{ secrets.GITHUB_TOKEN }}
          token: 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

      - name: Generate stats card dark
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show=reviews,prs_merged,prs_merged_percentage&show_icons=true&include_all_commits=true&count_private=true&hide_border=true&theme=dark
          path: profile/stats-dark.svg
          token: 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

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=20&show_icons=true&include_all_commits=true&count_private=true&hide_border=false&border_color=e5e3e3
          path: profile/top-langs.svg
          token: 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

      - name: Generate top languages card dark
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=20&show_icons=true&include_all_commits=true&count_private=true&hide_border=true&theme=dark
          path: profile/top-langs-dark.svg
          token: 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

      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push