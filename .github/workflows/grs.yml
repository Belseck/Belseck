name: Update README cards

on:
  schedule:
    - cron: "0 19 * * *"

  workflow_dispatch:

  push:
    branches:
    - master

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=Belseck&show_icons=true
          path: profile/stats.svg
          token: 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

      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push